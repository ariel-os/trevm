apps:
  - name:  minimal-update
    context:
      - nrf52840dk
      - rpi-pico2-w
      - espressif-esp32-c6-devkitc-1
    selects:
      - coap-server
      - ?coap-server-config-storage
      - alloc
    env:
      global:
        # Must be enough for two payloads, so requirements depend on the transmitted
        # payloads' sizes.
        heapsize_required:
          - "200000"
        RUSTFLAGS:
          # Disable SIMD in Wasmtime's interpreter
          - --cfg pulley_disable_interp_simd
